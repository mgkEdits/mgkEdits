<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work With Me | Elijah Nyasiando</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #10b981;
            --text: #ffffff;
            --input-bg: #111111;
            --border: #27272a;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }

        .contact-card {
            background: #111;
            border: 1px solid var(--border);
            padding: 3rem;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 { font-size: 2.5rem; letter-spacing: -2px; margin-bottom: 0.5rem; }
        p.desc { color: #a1a1aa; margin-bottom: 2rem; }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 0.5rem; font-weight: 700; }

        input, select, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 1rem;
            color: white;
            border-radius: 8px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 1.2rem;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1rem;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.02); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: #a1a1aa;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: white; }

        .direct-info {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr;
            font-size: 0.8rem;
            color: #71717a;
        }
    </style>
</head>
<body>

    <div class="contact-card">
        <h2>Let's build.</h2>
        <p class="desc">Select a service and tell me about your project.</p>

        <form action="https://formspree.io/f/mnjwzkdp" method="POST">
            <div class="form-group">
                <label>Service Type</label>
                <select name="service" required>
                    <option value="" disabled selected>Choose a range...</option>
                    <option value="Product Development">Product Development & Design</option>
                    <option value="Data Analytics">Data Analytics & Reporting</option>
                    <option value="Collaboration">Collaboration Request</option>
                </select>
            </div>

            <div class="form-group">
                <label>Your Name</label>
                <input type="text" name="name" placeholder="E.g. John Doe" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="email@company.com" required>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="4" placeholder="Briefly describe your needs..." required></textarea>
            </div>

            <button type="submit">Send Inquiry</button>
        </form>

        <div class="direct-info">
            <div>
                <strong>PHONE</strong><br>
                (+254) 714 424 587
            </div>
            <div>
                <strong>EMAIL</strong><br>
                elijahnyasiando.mn@gmail.com
            </div>
        </div>

        <a href="index.html" class="back-link">← Back to Portfolio</a>
    </div>

</body>
</html>
